<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইতিহাস — Chapter 1 | Class 10</title>
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Syne',sans-serif;background:#f0faf4;min-height:100vh;color:#1c2e24}
        
        .top-bar{background:#1a7a4a;padding:0.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px}
        .top-logo{font-size:1.1rem;font-weight:800;color:white;cursor:pointer}
        .top-logo span{color:#f9a825}
        .timer-box{background:rgba(255,255,255,0.15);border-radius:8px;padding:0.4rem 1rem;display:flex;align-items:center;gap:6px;font-size:1rem;font-weight:700;color:white}
        .timer-box.danger{background:#dc3545}
        
        .main{max-width:800px;margin:0 auto;padding:1.5rem 1rem}
        
        .start-wrap{background:white;border-radius:14px;padding:2rem;text-align:center;border:1px solid #c5dccb}
        .start-wrap h2{font-family:'Tiro Bangla',serif;font-size:1.4rem;color:#1c2e24;margin-bottom:0.5rem}
        .start-wrap p{font-family:'Tiro Bangla',serif;font-size:0.9rem;color:#5a7a66;line-height:1.7;margin-bottom:1.2rem}
        
        .set-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-top:1.5rem}
        .set-card{background:white;border-radius:12px;padding:1.2rem;border:1.5px solid #c5dccb;cursor:pointer;text-align:center;transition:0.3s}
        .set-card:hover{border-color:#1a7a4a;transform:translateY(-3px);box-shadow:0 4px 15px rgba(26,122,74,0.1)}
        .set-icon{font-size:2rem;margin-bottom:0.3rem}
        .set-title{font-family:'Tiro Bangla',serif;font-weight:700;font-size:1rem;color:#1c2e24}
        .set-sub{font-family:'Tiro Bangla',serif;font-size:0.75rem;color:#5a7a66;margin-top:0.2rem}
        .set-badge{display:inline-block;background:#e8f7ef;color:#1a7a4a;padding:0.1rem 0.8rem;border-radius:12px;font-size:0.65rem;font-weight:700;margin-top:0.4rem}
        
        .quiz-info{background:white;border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.2rem;border:1px solid #c5dccb;display:flex;gap:1rem;flex-wrap:wrap}
        .info-item{font-family:'Tiro Bangla',serif;font-size:0.85rem;color:#5a7a66}
        .info-item strong{color:#1a7a4a}
        .progress-wrap{background:#c5dccb;border-radius:4px;height:6px;margin-bottom:1.2rem;overflow:hidden}
        .progress-fill{height:100%;background:#1a7a4a;border-radius:4px;transition:width 0.3s}
        .q-card{background:white;border-radius:14px;padding:1.4rem;margin-bottom:1rem;border:1px solid #c5dccb;box-shadow:0 2px 10px rgba(26,122,74,0.06)}
        .q-num{font-size:0.75rem;font-weight:700;color:#e8730a;letter-spacing:1px;text-transform:uppercase;margin-bottom:0.6rem}
        .q-text{font-family:'Tiro Bangla',serif;font-size:1rem;color:#1c2e24;line-height:1.7;margin-bottom:1.1rem}
        .opts{display:flex;flex-direction:column;gap:0.6rem}
        .opt{display:flex;align-items:flex-start;gap:10px;padding:0.7rem 1rem;border:1.5px solid #c5dccb;border-radius:10px;cursor:pointer;transition:all 0.15s;background:white;text-align:left;width:100%}
        .opt:hover:not(.disabled){border-color:#1a7a4a;background:#f0faf4}
        .opt-circle{min-width:28px;height:28px;border-radius:50%;border:1.5px solid #c5dccb;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#5a7a66;flex-shrink:0}
        .opt-text{font-family:'Tiro Bangla',serif;font-size:0.92rem;color:#1c2e24;line-height:1.6;padding-top:2px}
        .opt.correct{border-color:#1a7a4a;background:#e8f7ef}
        .opt.correct .opt-circle{background:#1a7a4a;border-color:#1a7a4a;color:white}
        .opt.wrong{border-color:#dc3545;background:#fdf0f0}
        .opt.wrong .opt-circle{background:#dc3545;border-color:#dc3545;color:white}
        .opt.disabled{cursor:default}
        .explanation{background:#f0faf4;border-left:3px solid #1a7a4a;border-radius:0 8px 8px 0;padding:0.8rem 1rem;margin-top:0.8rem;display:none}
        .explanation.show{display:block}
        .explanation p{font-family:'Tiro Bangla',serif;font-size:0.88rem;color:#2c4035;line-height:1.7}
        .explanation strong{color:#1a7a4a}
        .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:0.8rem;flex-wrap:wrap;gap:10px}
        .score-show{font-family:'Tiro Bangla',serif;font-size:0.85rem;color:#5a7a66}
        .next-btn{background:#1a7a4a;color:white;border:none;padding:0.6rem 1.4rem;border-radius:8px;font-family:'Tiro Bangla',serif;font-size:0.9rem;cursor:pointer}
        .next-btn:hover{background:#2aad68}
        .next-btn:disabled{background:#c5dccb;cursor:default}
        
        .result-wrap{background:white;border-radius:14px;padding:2rem;text-align:center;border:1px solid #c5dccb;display:none}
        .result-wrap.show{display:block}
        .result-icon{font-size:3rem;margin-bottom:0.5rem}
        .result-score{font-size:3.5rem;font-weight:800;color:#1a7a4a}
        .result-total{font-size:1rem;color:#5a7a66;margin-bottom:0.5rem;font-family:'Tiro Bangla',serif}
        .result-grade{font-size:1.2rem;font-weight:600;color:#1c2e24;margin-bottom:1.5rem;font-family:'Tiro Bangla',serif}
        .result-bars{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.8rem;margin-bottom:1.5rem}
        .result-bar{background:#f0faf4;border-radius:10px;padding:0.8rem;text-align:center}
        .rb-num{font-size:1.4rem;font-weight:800}
        .rb-label{font-family:'Tiro Bangla',serif;font-size:0.8rem;color:#5a7a66;margin-top:0.2rem}
        .action-btns{display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap}
        .retry-btn{background:#1a7a4a;color:white;border:none;padding:0.75rem 2rem;border-radius:8px;font-family:'Tiro Bangla',serif;font-size:1rem;cursor:pointer}
        .review-btn{background:white;color:#1a7a4a;border:1.5px solid #1a7a4a;padding:0.75rem 2rem;border-radius:8px;font-family:'Tiro Bangla',serif;font-size:1rem;cursor:pointer}
        .back-btn{background:white;color:#5a7a66;border:1.5px solid #c5dccb;padding:0.6rem 2rem;border-radius:8px;font-family:'Tiro Bangla',serif;font-size:1rem;cursor:pointer;margin-top:0.6rem}
        
        .hidden{display:none !important}
        .text-center{text-align:center}
        
        @media(max-width:600px){
            .set-grid{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
            .result-bars{grid-template-columns:1fr}
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="top-logo" onclick="window.location.href='../../index.html'">Test <span>Bazar</span></div>
    <div class="timer-box" id="timerBox">⏱ <span id="timerDisplay">10:00</span></div>
</div>

<div class="main">

    <!-- ==================== START SCREEN ==================== -->
    <div class="start-wrap" id="startScreen">
        <div style="font-size:2.5rem;margin-bottom:0.8rem">📖</div>
        <h2>ইতিহাস — Chapter 1</h2>
        <p style="font-size:0.9rem;color:#5a7a66;">ইতিহাসের ধারণা — ১৫টি সেট</p>
        <p style="font-size:0.8rem;color:#5a7a66;margin-bottom:1rem;">প্রতিটি সেটে ১৫টি প্রশ্ন | সময়: ১০ মিনিট</p>
        
        <div class="set-grid" id="setGrid"></div>
        
        <button class="back-btn" onclick="window.location.href='../../index.html'" style="margin-top:1.5rem;">← Home এ ফিরে যাও</button>
    </div>

    <!-- ==================== QUIZ SCREEN ==================== -->
    <div id="quizScreen" class="hidden">
        <div class="quiz-info">
            <div class="info-item">📜 <strong id="setTitle">Set 1</strong></div>
            <div class="info-item">📝 Class 10 | ইতিহাস Chapter 1</div>
        </div>
        <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="q-card" id="qCard">
            <div class="q-num" id="qNum">প্রশ্ন ১ / ১৫</div>
            <div class="q-text" id="qText"></div>
            <div class="opts" id="qOpts"></div>
            <div class="explanation" id="explanation"><p id="explanationText"></p></div>
            <div class="nav-row">
                <div class="score-show" id="scoreShow">✅ সঠিক: ০ | ❌ ভুল: ০</div>
                <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>পরবর্তী →</button>
            </div>
        </div>
    </div>

    <!-- ==================== RESULT SCREEN ==================== -->
    <div class="result-wrap" id="resultWrap">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-score" id="finalScore"></div>
        <div class="result-total">/ ১৫</div>
        <div class="result-grade" id="resultGrade"></div>
        <div class="result-bars">
            <div class="result-bar"><div class="rb-num" id="rbCorrect" style="color:#1a7a4a"></div><div class="rb-label">সঠিক</div></div>
            <div class="result-bar"><div class="rb-num" id="rbWrong" style="color:#dc3545"></div><div class="rb-label">ভুল</div></div>
            <div class="result-bar"><div class="rb-num" id="rbPct" style="color:#e8730a"></div><div class="rb-label">স্কোর</div></div>
        </div>
        <div class="action-btns">
            <button class="retry-btn" onclick="retrySet()">আবার চেষ্টা করো</button>
            <button class="review-btn" onclick="showReview()">উত্তর দেখো</button>
        </div>
        <button class="back-btn" onclick="showSetSelection()">← সেট লিস্টে ফিরে যাও</button>
    </div>

</div>

<script>
// ====================================================================
//  ১৫টি সেট — প্রতিটি সেটে ১৫টি করে প্রশ্ন (মোট ২২৫টি প্রশ্ন)
// ====================================================================

const ALL_SETS = [
    // ===================== SET 1 =====================
    [
        {q:"আধুনিক ইতিহাসচর্চায় 'অ্যানাল' (Annales) পত্রিকা কবে প্রকাশিত হয়?", opts:["১৯২০ খ্রিস্টাব্দে","১৯২৯ খ্রিস্টাব্দে","১৯৬০ খ্রিস্টাব্দে","১৯৭০ খ্রিস্টাব্দে"], ans:1, exp:"ফরাসি ঐতিহাসিক মার্ক ব্লখ, লুসিয়েন ফেবর, ফার্নান্দ ব্রদেল প্রমুখ ১৯২৯ খ্রিস্টাব্দে 'অ্যানাল' পত্রিকা প্রকাশের মধ্য দিয়ে সামাজিক ইতিহাসচর্চার সূত্রপাত ঘটিয়েছিলেন।"},
        {q:"ভারতে নিম্নবর্গের ইতিহাসচর্চা (Subaltern Studies) কবে শুরু হয়?", opts:["১৯৬০ খ্রিস্টাব্দে","১৯৭০ খ্রিস্টাব্দে","১৯৮২ খ্রিস্টাব্দে","১৯৮৮ খ্রিস্টাব্দে"], ans:2, exp:"অধ্যাপক রণজিৎ গুহ রচিত 'সাবল্টার্ন স্টাডিজ'-এর প্রথম খণ্ড ১৯৮২ খ্রিস্টাব্দে প্রকাশের দ্বারা ভারতে নিম্নবর্গের ইতিহাসচর্চা শুরু হয়।"},
        {q:"\"নিম্নবর্গের মানুষ নিজেদের কথা নিজেদের মতো করে বলতে পারে না\"— উক্তিটি কার?", opts:["রণজিৎ গুহ","গায়ত্রী স্পিভাক","পার্থ চট্টোপাধ্যায়","গৌতম ভদ্র"], ans:1, exp:"নিম্নবর্গের ইতিহাসচর্চার কাঠিন্য বোঝাতে গিয়ে প্রখ্যাত ঐতিহাসিক ও চিন্তাবিদ গায়ত্রী স্পিভাক এই মন্তব্যটি করেছিলেন।"},
        {q:"'ব্রিটিশ সোসাইটি অফ স্পোর্টস হিস্ট্রি' কবে প্রতিষ্ঠিত হয়?", opts:["১৯৭০ খ্রিস্টাব্দে","১৯৭৪ খ্রিস্টাব্দে","১৯৭৬ খ্রিস্টাব্দে","১৯৮২ খ্রিস্টাব্দে"], ans:3, exp:"খেলাধুলার ইতিহাস নিয়ে সাংগঠনিকভাবে চর্চা করার উদ্দেশ্যে ইউরোপে ১৯৮২ খ্রিস্টাব্দে এই সংস্থাটি প্রতিষ্ঠিত হয়েছিল।"},
        {q:"ভারতে খেলার ইতিহাস নিয়ে প্রথম কে গবেষণা করেন?", opts:["রামচন্দ্র গুহ","বোরিয়া মজুমদার","সৌমেন মিত্র","কৌশিক বন্দ্যোপাধ্যায়"], ans:2, exp:"১৯৮৮ খ্রিস্টাব্দে সৌমেন মিত্র 'ঔপনিবেশিক বাংলায় ফুটবল, জাতীয়তাবাদ, সাম্প্রদায়িকতা ও উগ্রপ্রাদেশিকতা' নামক গবেষণার মাধ্যমে ভারতে প্রথম খেলার ইতিহাস নিয়ে কাজ শুরু করেন।"},
        {q:"মোহনবাগান ক্লাব কবে আই.এফ.এ (IFA) শিল্ড জয় করেছিল?", opts:["১৮৮৯ খ্রিস্টাব্দে","১৮৯৬ খ্রিস্টাব্দে","১৯১১ খ্রিস্টাব্দে","১৯২০ খ্রিস্টাব্দে"], ans:2, exp:"১৯১১ খ্রিস্টাব্দে মোহনবাগান ইংরেজদের ইস্ট ইয়র্ক ক্লাবকে হারিয়ে আই.এফ.এ শিল্ড জিতেছিল, যা পরাধীন ভারতে দেশবিজয়ের মতো জাতীয়তাবোধের সঞ্চার করেছিল।"},
        {q:"'খেলা যখন ইতিহাস' গ্রন্থটি কার লেখা?", opts:["রামচন্দ্র গুহ","বোরিয়া মজুমদার","রিচার্ড হোল্ট","কৌশিক বন্দ্যোপাধ্যায়"], ans:3, exp:"তরুণ ঐতিহাসিক কৌশিক বন্দ্যোপাধ্যায় ভারতের ইতিহাসচর্চায় খেলাধুলার প্রভাব ও জাতীয়তাবাদ নিয়ে এই গ্রন্থটি রচনা করেছেন।"},
        {q:"প্রাচীন গ্রিসের অলিম্পিয়াতে প্রথম অলিম্পিক গেমস কবে চালু হয়েছিল?", opts:["৭৭৬ খ্রিস্টপূর্বাব্দে","৪৮০ খ্রিস্টপূর্বাব্দে","১৮৯৬ খ্রিস্টাব্দে","১৯১১ খ্রিস্টাব্দে"], ans:0, exp:"প্রাচীন যুগ থেকেই বিশ্বে খেলাকে গুরুত্ব দেওয়া হতো এবং প্রাচীন গ্রিসের অলিম্পিয়াতে প্রথম অলিম্পিক গেমস চালু হয়েছিল ৭৭৬ খ্রিস্টপূর্বাব্দে।"},
        {q:"আধুনিক ইতিহাসচর্চায় 'তলা থেকে ইতিহাস' (History from below) পদ্ধতি কোন্ ইতিহাস রচনায় ব্যবহৃত হয়?", opts:["সামরিক ইতিহাস","নতুন সামাজিক ইতিহাস","খেলার ইতিহাস","শহরের ইতিহাস"], ans:1, exp:"নতুন সামাজিক ইতিহাসে সমাজের উচ্চ-নীচ সব শ্রেণির সাধারণ মানুষের কথা লেখা হয় বলে এই ইতিহাস রচনার ক্ষেত্রে 'History from below' পদ্ধতি ব্যবহার করা হয়।"},

function initSetGrid() {
    const grid = document.getElementById('setGrid');
    grid.innerHTML = '';
    for (let i = 0; i < ALL_SETS.length; i++) {
        const card = document.createElement('div');
        card.className = 'set-card';
        card.innerHTML = `
            <div class="set-icon">${SET_ICONS[i] || '📝'}</div>
            <div class="set-title">Set ${i + 1}</div>
            <div class="set-sub">${SET_NAMES[i] || 'সেট ' + (i+1)}</div>
            <span class="set-badge">১৫ প্রশ্ন</span>
        `;
        card.onclick = () => startSet(i);
        grid.appendChild(card);
    }
}

function showSetSelection() {
    document.getElementById('startScreen').style.display = 'block';
    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('resultWrap').classList.remove('show');
    document.getElementById('timerBox').classList.add('hidden');
    initSetGrid();
}

function startSet(setIndex) {
    currentSet = setIndex;
    currentQ = 0;
    score = 0;
    wrong = 0;
    answered = false;
    userAnswers = [];
    timeLeft = 600;

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('resultWrap').classList.remove('show');
    document.getElementById('quizScreen').classList.remove('hidden');
    document.getElementById('timerBox').classList.remove('hidden');
    document.getElementById('timerBox').classList.remove('danger');
    document.getElementById('setTitle').textContent = 'Set ' + (setIndex + 1) + ' — ' + (SET_NAMES[setIndex] || '');

    clearInterval(timerInterval);
    timerInterval = setInterval(tick, 1000);
    loadQuestion();
}

function tick() {
    timeLeft--;
    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    document.getElementById('timerDisplay').textContent = m + ':' + (s < 10 ? '0' : '') + s;
    if (timeLeft <= 60) document.getElementById('timerBox').classList.add('danger');
    if (timeLeft <= 0) { clearInterval(timerInterval); showResult(); }
}

function loadQuestion() {
    const qs = ALL_SETS[currentSet];
    const q = qs[currentQ];
    answered = false;

    document.getElementById('qNum').textContent = 'প্রশ্ন ' + (currentQ + 1) + ' / ' + qs.length;
    document.getElementById('qText').textContent = q.q;
    document.getElementById('progressFill').style.width = ((currentQ + 1) / qs.length * 100) + '%';
    document.getElementById('nextBtn').disabled = true;
    document.getElementById('nextBtn').textContent = currentQ === qs.length - 1 ? 'ফলাফল দেখো' : 'পরবর্তী →';
    document.getElementById('explanation').classList.remove('show');
    document.getElementById('scoreShow').textContent = '✅ সঠিক: ' + score + ' | ❌ ভুল: ' + wrong;

    const opts = document.getElementById('qOpts');
    opts.innerHTML = '';
    const labels = ['ক', 'খ', 'গ', 'ঘ'];
    q.opts.forEach((o, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.innerHTML = '<div class="opt-circle">' + labels[i] + '</div><div class="opt-text">' + o + '</div>';
        btn.onclick = () => selectAnswer(i);
        opts.appendChild(btn);
    });
}

function selectAnswer(idx) {
    if (answered) return;
    answered = true;
    const qs = ALL_SETS[currentSet];
    const q = qs[currentQ];
    userAnswers[currentQ] = idx;

    const btns = document.querySelectorAll('.opt');
    btns.forEach(b => b.classList.add('disabled'));
    btns[q.ans].classList.add('correct');
    if (idx !== q.ans) {
        btns[idx].classList.add('wrong');
        wrong++;
    } else {
        score++;
    }

    document.getElementById('scoreShow').textContent = '✅ সঠিক: ' + score + ' | ❌ ভুল: ' + wrong;
    document.getElementById('explanationText').innerHTML = '<strong>ব্যাখ্যা:</strong> ' + q.exp;
    document.getElementById('explanation').classList.add('show');
    document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() {
    const qs = ALL_SETS[currentSet];
    currentQ++;
    if (currentQ >= qs.length) {
        clearInterval(timerInterval);
        showResult();
        return;
    }
    loadQuestion();
}

function showResult() {
    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('resultWrap').classList.add('show');
    document.getElementById('timerBox').classList.add('hidden');

    const total = ALL_SETS[currentSet].length;
    const pct = Math.round(score / total * 100);
    document.getElementById('finalScore').textContent = score;
    document.getElementById('rbCorrect').textContent = score;
    document.getElementById('rbWrong').textContent = wrong;
    document.getElementById('rbPct').textContent = pct + '%';

    let icon, grade;
    if (pct >= 90) { icon = '🌟'; grade = 'অসাধারণ! তুমি দুর্দান্ত!'; }
    else if (pct >= 70) { icon = '👍'; grade = 'খুব ভালো! আরও একটু practice করো।'; }
    else if (pct >= 50) { icon = '📚'; grade = 'ভালো চেষ্টা! পরের সেট চেষ্টা করো।'; }
    else { icon = '💪'; grade = 'চেষ্টা চালিয়ে যাও! নোটস পড়ে আবার দাও।'; }

    document.getElementById('resultIcon').textContent = icon;
    document.getElementById('resultGrade').textContent = grade;
}

function retrySet() {
    document.getElementById('resultWrap').classList.remove('show');
    startSet(currentSet);
}

function showReview() {
    document.getElementById('resultWrap').classList.remove('show');
    document.getElementById('quizScreen').classList.remove('hidden');
    currentQ = 0;
    loadReview();
}

function loadReview() {
    const qs = ALL_SETS[currentSet];
    if (currentQ >= qs.length) {
        document.getElementById('quizScreen').classList.add('hidden');
        document.getElementById('resultWrap').classList.add('show');
        return;
    }
    const q = qs[currentQ];
    document.getElementById('qNum').textContent = 'Review — প্রশ্ন ' + (currentQ + 1) + ' / ' + qs.length;
    document.getElementById('qText').textContent = q.q;
    document.getElementById('progressFill').style.width = ((currentQ + 1) / qs.length * 100) + '%';
    document.getElementById('nextBtn').disabled = false;
    document.getElementById('nextBtn').textContent = currentQ === qs.length - 1 ? 'শেষ করো' : 'পরবর্তী →';
    document.getElementById('nextBtn').onclick = () => { currentQ++; loadReview(); };
    document.getElementById('scoreShow').textContent = '🟢 সবুজ = সঠিক উত্তর';

    const opts = document.getElementById('qOpts');
    opts.innerHTML = '';
    const labels = ['ক', 'খ', 'গ', 'ঘ'];
    q.opts.forEach((o, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt disabled';
        if (i === q.ans) btn.classList.add('correct');
        else if (userAnswers[currentQ] === i) btn.classList.add('wrong');
        btn.innerHTML = '<div class="opt-circle">' + labels[i] + '</div><div class="opt-text">' + o + '</div>';
        opts.appendChild(btn);
    });

    document.getElementById('explanationText').innerHTML = '<strong>ব্যাখ্যা:</strong> ' + q.exp;
    document.getElementById('explanation').classList.add('show');
}

</script>
